name: '🚀 Feature Request'
description: "Suggest a novel capability or enhancement for the system's evolution."
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        We are always seeking to expand the system's cognitive horizons. Please share your vision.
  - type: textarea
    id: problem
    attributes:
      label: 'Problem Description'
      description: "Is your request related to a specific limitation or a gap in the system's current functionality?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 'Proposed Evolutionary Path'
      description: "Describe the new manifestation of intelligence or utility you'd like to see implemented."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 'Alternative Approaches'
      description: 'Have you considered other methods to achieve this outcome?'
  - type: textarea
    id: context
    attributes:
      label: 'Additional Context'
      description: 'Any further conceptual or technical details to help us understand the vision.'
