<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700&amp;display=swap');
    .title { font: bold 60px 'Inter', 'Segoe UI', Roboto, sans-serif; fill: #fff; filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5)); }
    .subtitle { font: 300 24px 'Inter', 'Segoe UI', Roboto, sans-serif; fill: #a78bfa; letter-spacing: 0.2em; text-transform: uppercase; }
  </style>
  <rect width="1000" height="300" rx="24" fill="#0f172a" />
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="1000" height="300" rx="24" fill="url(#grad1)" />

  <!-- Abstract Shapes -->
  <circle cx="850" cy="80" r="100" fill="#7c3aed" fill-opacity="0.2" filter="url(#glow)" />
  <circle cx="150" cy="220" r="70" fill="#8b5cf6" fill-opacity="0.15" filter="url(#glow)" />

  <text x="500" y="145" text-anchor="middle" class="title">PERPLEXITY HISTORY</text>
  <text x="500" y="195" text-anchor="middle" class="subtitle">Export • Search • Synthesize</text>

  <!-- Decorative Line -->
  <rect x="420" y="220" width="160" height="2" rx="1" fill="#7c3aed" fill-opacity="0.5" />
</svg>
